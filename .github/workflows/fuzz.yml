name: Fuzz Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: package-lock.json
    - run: npm ci
    - name: Run Fuzz Tests
      run: npm run test --workspace=sdk -- --run tests/fuzz.test.ts
