# postgresql-performance.conf — query optimization settings
# Include this file from your main postgresql.conf:
#   include = '/etc/postgresql/postgresql-performance.conf'
#
# Or apply via ALTER SYSTEM for each parameter and run SELECT pg_reload_conf();

# ─── Slow query logging ──────────────────────────────────────────
# Log queries taking longer than 100ms
log_min_duration_statement = 100          # milliseconds; -1 to disable

# Minimal statement logging (slow queries only, no per-statement overhead)
log_statement = 'none'
log_duration = off

# ─── pg_stat_statements ─────────────────────────────────────────
# Must also CREATE EXTENSION pg_stat_statements in the database.
# See migration 005_query_optimization_indexes.ts
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.save = on

# ─── Query planner ──────────────────────────────────────────────
# Allow the planner to use index-only scans and parallel queries
enable_indexscan = on
enable_indexonlyscan = on
enable_bitmapscan = on
max_parallel_workers_per_gather = 2
max_parallel_workers = 4

# ─── Memory ─────────────────────────────────────────────────────
# Tune for a container with ~2 GB RAM:
shared_buffers = 512MB                    # 25% of RAM
effective_cache_size = 1536MB             # 75% of RAM (planner hint)
work_mem = 16MB                           # per-sort/hash; multiply by max connections
maintenance_work_mem = 128MB              # for VACUUM, CREATE INDEX, etc.

# ─── Checkpointing ──────────────────────────────────────────────
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100           # more stats = better plans

# ─── Connection pooling (complement to pgbouncer) ───────────────
max_connections = 100                     # pgbouncer connects ~25–35 backends
