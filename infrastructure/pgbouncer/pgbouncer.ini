# pgbouncer.ini — C-Address Bridge connection pooler configuration
# Docs: https://www.pgbouncer.org/config.html

[databases]
# Production database — transaction pooling for best concurrency
c_address_bridge = host=${DB_HOST} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER}

# Read replica (optional — for analytics / dashboard queries)
# c_address_bridge_ro = host=${DB_HOST_RO} port=${DB_PORT} dbname=${DB_NAME} user=${DB_USER_RO}

[pgbouncer]
# ─── Pooling mode ───────────────────────────────────────────────
# transaction mode: best throughput for short API queries.
# session mode: required if using prepared statements or advisory locks.
pool_mode = transaction

# ─── Listening ──────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/postgresql

# ─── Authentication ─────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

# ─── Pool sizing ────────────────────────────────────────────────
# max_client_conn: maximum frontend (app → pgbouncer) connections
# default_pool_size: backend (pgbouncer → postgres) connections per user/db pair
# min_pool_size: keep N connections warm at all times
# reserve_pool_size: extra connections for burst traffic
max_client_conn = 500
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

# ─── Timeouts ───────────────────────────────────────────────────
server_connect_timeout = 10
server_login_retry = 5
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 30
client_login_timeout = 10
idle_transaction_timeout = 10

# ─── Connection lifecycle ────────────────────────────────────────
server_lifetime = 3600
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30

# ─── TLS (uncomment to enable) ───────────────────────────────────
# client_tls_sslmode = require
# client_tls_key_file = /etc/pgbouncer/server.key
# client_tls_cert_file = /etc/pgbouncer/server.crt
# server_tls_sslmode = require

# ─── Admin console ──────────────────────────────────────────────
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats

# ─── Logging ────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

# ─── DNS / async ────────────────────────────────────────────────
dns_max_ttl = 15
dns_nxdomain_ttl = 15
